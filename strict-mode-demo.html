<!doctype html>
<html lang="en">
  <head>
    <title>Strict Mode Example</title>
  </head>
  <body>
    <h2>JavaScript Strict Mode</h2>
    <script>
      'use strict'
      let a = 1
      window.document.writeln('<h1> a=' + a + '</h1>')
      const b = 3.14
      window.document.writeln('<h1> b=' + b + '</h1>')
      x = 100
      window.document.writeln('<h1> x=' + x + '</h1>')
    </script>
  </body>
</html>
